syntax = "proto3";

package evrp.device.v1;

import "evrp/device/v1/types.proto";

service InputDeviceService {
  rpc GetCursorPositionAvailability(GetCursorPositionAvailabilityRequest)
      returns (GetCursorPositionAvailabilityResponse);

  rpc ReadCursorPosition(ReadCursorPositionRequest) returns (ReadCursorPositionResponse);

  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);

  rpc Ping(PingRequest) returns (PingResponse);
}
