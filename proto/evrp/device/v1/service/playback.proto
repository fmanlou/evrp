// evrp-device：录制上传与回放 RPC。消息类型见 `evrp/device/v1/types.proto`。

syntax = "proto3";

package evrp.device.v1;

import "google/protobuf/empty.proto";
import "evrp/device/v1/types.proto";

service PlaybackService {
  rpc Upload(UploadRecordingRequest) returns (OperationResult);

  rpc Playback(PlaybackRecordingRequest) returns (OperationResult);

  rpc Stop(google.protobuf.Empty) returns (google.protobuf.Empty);
}
