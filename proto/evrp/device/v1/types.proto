// evrp-device：v1 消息/枚举定义（无 service）。gRPC 定义见 service.proto。
//
// - 录制读：`StartRecordingRequest`、`WaitForInputEvent*`、`ReadInputEventsResponse`、
//   `InputEvent` 等与 `IInputListener` / 录制流水线对应。
// - 上传/回放/光标/保活等请求响应见下文消息。

syntax = "proto3";

package evrp.device.v1;

option cc_enable_arenas = true;

// ---------------------------------------------------------------------------
// 设备类型（与 deviceid 一致）
// ---------------------------------------------------------------------------

enum DeviceKind {
  DEVICE_KIND_UNSPECIFIED = 0;
  DEVICE_KIND_TOUCHPAD = 1;
  DEVICE_KIND_TOUCHSCREEN = 2;
  DEVICE_KIND_MOUSE = 3;
  DEVICE_KIND_KEYBOARD = 4;
}

message StartRecordingRequest {
  repeated DeviceKind kinds = 1;
}

// 单条输入事件（linux input_event 语义 + 来源设备）
message InputEvent {
  DeviceKind device = 1;
  int64 time_sec = 2;
  int64 time_usec = 3;
  uint32 type = 4;
  uint32 code = 5;
  int32 value = 6;
}

message WaitForInputEventRequest {
  // 毫秒；与 `IInputListener::wait_for_input_event` 一致，须 >= 0。
  int32 timeout_ms = 1;
}

message WaitForInputEventResponse {
  bool ready = 1;
}

message ReadInputEventsResponse {
  repeated InputEvent events = 1;
}

// ---------------------------------------------------------------------------
// 录制资源：按「开始帧 → 若干中间帧 → 结束帧」上传（client → device）。每帧一次
// `PlaybackService.UploadRecording` Unary，`UploadRecordingStatus` 为当次应答。
// 中间帧（数据帧）承载 payload 分片及本帧校验码；算法与顺序由收发端约定。
// ---------------------------------------------------------------------------

// 开始帧：一次上传会话的第一帧。
message UploadRecordingStartFrame {}

// 中间帧（数据帧）：payload 分片，可连续多条；每帧携带针对本帧 data 的校验码。
message UploadRecordingMiddleFrame {
  bytes data = 1;
  // 针对本帧 `data` 的校验码（通常为 CRC32；算法由实现约定，收发端须一致）。
  uint32 checksum = 2;
}

// 结束帧：一次上传会话的最后一帧（无 payload）。
message UploadRecordingEndFrame {}

message UploadRecordingFrame {
  oneof frame {
    UploadRecordingStartFrame start = 1;
    UploadRecordingMiddleFrame middle = 2;
    UploadRecordingEndFrame end = 3;
  }
}

message UploadRecordingStatus {
  int32 code = 1;
  string message = 2;
}

// ---------------------------------------------------------------------------
// 回放：在 device 上注入当前已缓存的录制资源（Unary）；具体缓存策略由实现决定。
// ---------------------------------------------------------------------------

message PlaybackRecordingRequest {}

message PlaybackRecordingResponse {
  int32 code = 1;
  string message = 2;
}

message GetCursorPositionAvailabilityRequest {}

message GetCursorPositionAvailabilityResponse {
  bool available = 1;
}

message ReadCursorPositionRequest {}

message ReadCursorPositionResponse {
  int32 x = 1;
  int32 y = 2;
}

// ---------------------------------------------------------------------------
// 保活
// ---------------------------------------------------------------------------

message PingRequest {}

message PingResponse {}
