syntax = "proto3";

package evrp.device.v1;

option cc_enable_arenas = true;

enum DeviceKind {
  DEVICE_KIND_UNSPECIFIED = 0;
  DEVICE_KIND_TOUCHPAD = 1;
  DEVICE_KIND_TOUCHSCREEN = 2;
  DEVICE_KIND_MOUSE = 3;
  DEVICE_KIND_KEYBOARD = 4;
}

message StartRecordingRequest {
  repeated DeviceKind kinds = 1;
}

message InputEvent {
  DeviceKind device = 1;
  int64 time_sec = 2;
  int64 time_usec = 3;
  uint32 type = 4;
  uint32 code = 5;
  int32 value = 6;
}

message WaitForInputEventRequest {
  int32 timeout_ms = 1;
}

message WaitForInputEventResponse {
  bool ready = 1;
}

message ReadInputEventsResponse {
  repeated InputEvent events = 1;
}

message OperationResult {
  int32 code = 1;
  string message = 2;
}

message UploadRecordingRequest {
  repeated InputEvent events = 1;
}

message PlaybackRecordingRequest {}

message PlaybackProgress {
  int32 event_index = 1;
}

message GetCursorPositionAvailabilityRequest {}

message GetCursorPositionAvailabilityResponse {
  bool available = 1;
}

message ReadCursorPositionRequest {}

message ReadCursorPositionResponse {
  int32 x = 1;
  int32 y = 2;
}

message PingRequest {}

message PingResponse {}

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  repeated DeviceKind supported_kinds = 1;
}
