syntax = "proto3";

package evrp.server.v1;

import "google/protobuf/struct.proto";

message RecordRequest {
  google.protobuf.Struct settings = 1;
  string output_path = 2;
  repeated string kinds = 3;
}

message ReplayRequest {
  google.protobuf.Struct settings = 1;
  string playback_path = 2;
}

message RunResponse {
  int32 exit_code = 1;
  string message = 2;
}

service HostControl {
  rpc Record(RecordRequest) returns (RunResponse);
  rpc Replay(ReplayRequest) returns (RunResponse);
}
