syntax = "proto3";

package evrp.v1.device;

import "evrp/v1/device/types/common.proto";

message StartRecordingRequest {
  repeated DeviceKind kinds = 1;
}

message WaitForInputEventRequest {
  int32 timeout_ms = 1;
}

message WaitForInputEventResponse {
  bool ready = 1;
}

message ReadInputEventsResponse {
  repeated InputEvent events = 1;
}
