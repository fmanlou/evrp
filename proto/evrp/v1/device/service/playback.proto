syntax = "proto3";

package evrp.v1.device;

import "google/protobuf/empty.proto";
import "evrp/v1/device/types/playback.proto";
import "evrp/v1/sdk/types/common.proto";

service PlaybackService {
  rpc Upload(UploadRecordingRequest) returns (evrp.v1.sdk.StatusCode);

  rpc Playback(PlaybackRecordingRequest) returns (evrp.v1.sdk.StatusCode);

  rpc SubscribePlayback(google.protobuf.Empty) returns (stream PlaybackProgress);

  rpc Stop(google.protobuf.Empty) returns (google.protobuf.Empty);
}
